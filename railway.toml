# Railway Deploy Configuration
# Pattern source: shared/patterns/railway-deploy-config.md

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
startCommand = "uvicorn python_depot.api:app --host 0.0.0.0 --port 8000"

[environments.production]
variables = { ENVIRONMENT = "production", LOG_LEVEL = "info", PYTHONUNBUFFERED = "1", PORT = "8000" }

[environments.staging]
variables = { ENVIRONMENT = "staging", LOG_LEVEL = "debug" }
